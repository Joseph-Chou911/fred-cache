name: Update Dashboard (market_cache)

on:
  workflow_dispatch: {}
  schedule:
    # 23:10 Asia/Taipei = 15:10 UTC
    - cron: "10 15 * * *"

permissions:
  contents: write

concurrency:
  group: repo-writer-main
  cancel-in-progress: false

jobs:
  dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Force matplotlib to use a fresh, per-run config/cache dir (avoids stale font cache issues)
    env:
      MPLCONFIGDIR: ${{ github.workspace }}/.mplconfig

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pandas matplotlib

      - name: Install CJK fonts
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fontconfig

          # Refresh fontconfig cache (important on runners)
          sudo fc-cache -f -v || true

          # Ensure matplotlib cache is not stale
          rm -rf ~/.cache/matplotlib || true
          rm -rf "${MPLCONFIGDIR}" || true
          mkdir -p "${MPLCONFIGDIR}"

      # Optional but very useful: prove the runner really sees Noto CJK fonts
      - name: Font diag (audit)
        shell: bash
        run: |
          set -euo pipefail
          echo "MPLCONFIGDIR=${MPLCONFIGDIR}"
          fc-list | grep -i "noto.*cjk" | head -n 30 || true
          ls -al /usr/share/fonts/opentype/noto/ || true

      - name: Ensure dashboard dir
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dashboard

      - name: Render dashboard (market_cache)
        shell: bash
        run: |
          set -euo pipefail
          python scripts/render_dashboard.py \
            --stats market_cache/stats_latest.json \
            --dash-history dashboard/history.json \
            --out-md dashboard/DASHBOARD.md \
            --out-json dashboard/dashboard_latest.json \
            --module market_cache \
            --stale-hours 36 \
            --ruleset-id signals_v8 \
            --script-fingerprint render_dashboard_py_signals_v8

      - name: Append dashboard history
        shell: bash
        run: |
          set -euo pipefail
          python scripts/append_dashboard_history.py \
            --latest dashboard/dashboard_latest.json \
            --history dashboard/history.json \
            --max-items 400

      - name: Build charts (from dashboard/DASHBOARD.md)
        shell: bash
        run: |
          set -euo pipefail
          # Clean output dir to avoid accidentally keeping old PNGs
          rm -rf dashboard/charts/market_cache || true
          mkdir -p dashboard/charts/market_cache

          python tools/make_market_cache_charts.py \
            --report dashboard/DASHBOARD.md \
            --out dashboard/charts/market_cache

          # Quick artifact audit (file sizes + hash) to confirm charts changed
          ls -al dashboard/charts/market_cache
          python - << 'PY'
import hashlib, glob
for p in sorted(glob.glob("dashboard/charts/market_cache/*.png")):
    with open(p,"rb") as f:
        b=f.read()
    h=hashlib.sha256(b).hexdigest()[:16]
    print(f"{p}  bytes={len(b)}  sha256_16={h}")
PY

      - name: Commit & push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add dashboard/DASHBOARD.md dashboard/dashboard_latest.json dashboard/history.json
          git add dashboard/charts/market_cache

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "chore: update dashboard (mvp)"
          git pull --rebase origin main
          git push origin HEAD:main