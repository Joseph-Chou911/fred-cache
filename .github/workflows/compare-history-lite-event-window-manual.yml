name: Compare history_lite event window (manual baseline + auto latest)

on:
  workflow_dispatch:
    inputs:
      file:
        description: "Input JSON path"
        required: false
        default: "cache/history_lite.json"
      series:
        description: "Optional series_id filter. Leave blank to compare ALL series."
        required: false
        default: ""
      baseline_date:
        description: "Old/baseline event date, e.g. 2025-04-07"
        required: true
        default: "2025-04-07"
      pre_days:
        description: "Number of calendar days before each event date"
        required: true
        default: "10"
      post_days:
        description: "Number of calendar days after each event date"
        required: true
        default: "10"
      max_gap_days:
        description: "Mark as STALE_MATCH if matched_date is older than this many days from target date"
        required: true
        default: "7"
      json_out:
        description: "Output JSON path"
        required: false
        default: "cache/compare/compare_history_lite_event_window_out.json"
      csv_out:
        description: "Output CSV path"
        required: false
        default: "cache/compare/compare_history_lite_event_window_out.csv"
      report_out:
        description: "Output Markdown report path"
        required: false
        default: "cache/compare/report.md"
      focus_series:
        description: "Comma-separated focus series list for report renderer"
        required: false
        default: "BAMLH0A0HYM2,VIXCLS,SP500,NASDAQCOM,DCOILWTICO,DGS10,DGS2,T10Y2Y,T10Y3M,STLFSI4,NFCINONFINLEVERAGE,DTWEXBGS"

permissions:
  contents: write

concurrency:
  group: compare-history-lite-event-window-manual
  cancel-in-progress: false

jobs:
  run-compare-history-lite-event-window:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Show inputs
        shell: bash
        run: |
          echo "file=${{ github.event.inputs.file }}"
          echo "series=${{ github.event.inputs.series }}"
          echo "baseline_date=${{ github.event.inputs.baseline_date }}"
          echo "pre_days=${{ github.event.inputs.pre_days }}"
          echo "post_days=${{ github.event.inputs.post_days }}"
          echo "max_gap_days=${{ github.event.inputs.max_gap_days }}"
          echo "json_out=${{ github.event.inputs.json_out }}"
          echo "csv_out=${{ github.event.inputs.csv_out }}"
          echo "report_out=${{ github.event.inputs.report_out }}"
          echo "focus_series=${{ github.event.inputs.focus_series }}"

      - name: Validate scripts exist
        shell: bash
        run: |
          test -f tools/compare_history_lite_event_window.py
          test -f tools/render_compare_history_lite_event_window_report.py

      - name: Create output directories
        shell: bash
        run: |
          mkdir -p "$(dirname "${{ github.event.inputs.json_out }}")"
          mkdir -p "$(dirname "${{ github.event.inputs.csv_out }}")"
          mkdir -p "$(dirname "${{ github.event.inputs.report_out }}")"

      - name: Resolve latest date from history_lite.json
        id: resolve_dates
        shell: bash
        run: |
          set -euo pipefail

          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          file_path = Path("${{ github.event.inputs.file }}")
          baseline_date = "${{ github.event.inputs.baseline_date }}"

          if not file_path.exists():
              raise SystemExit(f"Input file not found: {file_path}")

          with file_path.open("r", encoding="utf-8") as f:
              data = json.load(f)

          date_re = re.compile(r"^\d{4}-\d{2}-\d{2}$")
          candidate_keys = {"date", "data_date", "obs_date"}

          found_dates = []

          def walk(x):
              if isinstance(x, dict):
                  for k, v in x.items():
                      if k in candidate_keys and isinstance(v, str) and date_re.match(v):
                          found_dates.append(v)
                      walk(v)
              elif isinstance(x, list):
                  for item in x:
                      walk(item)

          walk(data)

          if not found_dates:
              raise SystemExit(
                  "No valid dates found in history_lite.json. "
                  "Please check date field names (expected one of: date, data_date, obs_date)."
              )

          latest_date = max(found_dates)
          event_dates = f"{baseline_date},{latest_date}"

          github_env = os.environ["GITHUB_ENV"]
          with open(github_env, "a", encoding="utf-8") as envf:
              envf.write(f"LATEST_DATE={latest_date}\n")
              envf.write(f"EVENT_DATES={event_dates}\n")

          print(f"baseline_date={baseline_date}")
          print(f"latest_date={latest_date}")
          print(f"event_dates={event_dates}")
          PY

      - name: Show resolved dates
        shell: bash
        run: |
          echo "Resolved latest date: ${LATEST_DATE}"
          echo "Resolved event_dates: ${EVENT_DATES}"

      - name: Run compare_history_lite_event_window.py
        shell: bash
        run: |
          set -euo pipefail

          CMD=(
            python tools/compare_history_lite_event_window.py
            --file "${{ github.event.inputs.file }}"
            --event-dates "${EVENT_DATES}"
            --pre-days "${{ github.event.inputs.pre_days }}"
            --post-days "${{ github.event.inputs.post_days }}"
            --max-gap-days "${{ github.event.inputs.max_gap_days }}"
            --json-out "${{ github.event.inputs.json_out }}"
            --csv-out "${{ github.event.inputs.csv_out }}"
          )

          if [ -n "${{ github.event.inputs.series }}" ]; then
            CMD+=( --series "${{ github.event.inputs.series }}" )
          fi

          printf 'Running command:\n'
          printf '%q ' "${CMD[@]}"
          printf '\n\n'

          "${CMD[@]}"

      - name: Run render_compare_history_lite_event_window_report.py
        shell: bash
        run: |
          set -euo pipefail

          CMD=(
            python tools/render_compare_history_lite_event_window_report.py
            --input "${{ github.event.inputs.json_out }}"
            --output "${{ github.event.inputs.report_out }}"
            --focus-series "${{ github.event.inputs.focus_series }}"
          )

          printf 'Running renderer:\n'
          printf '%q ' "${CMD[@]}"
          printf '\n\n'

          "${CMD[@]}"

      - name: Show output file info
        shell: bash
        run: |
          echo "=== JSON output ==="
          if [ -f "${{ github.event.inputs.json_out }}" ]; then
            ls -lh "${{ github.event.inputs.json_out }}"
          else
            echo "JSON output not found"
            exit 1
          fi

          echo "=== CSV output ==="
          if [ -f "${{ github.event.inputs.csv_out }}" ]; then
            ls -lh "${{ github.event.inputs.csv_out }}"
          else
            echo "CSV output not found"
            exit 1
          fi

          echo "=== REPORT output ==="
          if [ -f "${{ github.event.inputs.report_out }}" ]; then
            ls -lh "${{ github.event.inputs.report_out }}"
          else
            echo "Report output not found"
            exit 1
          fi

      - name: Preview output head
        shell: bash
        run: |
          echo "=== JSON head ==="
          head -n 40 "${{ github.event.inputs.json_out }}" || true

          echo "=== CSV head ==="
          head -n 20 "${{ github.event.inputs.csv_out }}" || true

          echo "=== REPORT head ==="
          head -n 80 "${{ github.event.inputs.report_out }}" || true

      - name: Commit outputs back to repo
        shell: bash
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            "${{ github.event.inputs.json_out }}" \
            "${{ github.event.inputs.csv_out }}" \
            "${{ github.event.inputs.report_out }}"

          if git diff --cached --quiet; then
            echo "No output changes to commit."
            exit 0
          fi

          git commit -m "Add compare history_lite event window outputs"
          git push

      - name: Upload output artifacts
        uses: actions/upload-artifact@v4
        with:
          name: compare-history-lite-event-window-output
          path: |
            ${{ github.event.inputs.json_out }}
            ${{ github.event.inputs.csv_out }}
            ${{ github.event.inputs.report_out }}
          if-no-files-found: error