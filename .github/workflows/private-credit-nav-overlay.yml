name: private-credit-nav-overlay

on:
  workflow_dispatch:
    inputs:
      out_dir:
        description: "Output directory"
        required: true
        default: "private_credit_nav_cache"
      manual_nav:
        description: "Optional manual NAV JSON path"
        required: false
        default: ""
      tickers:
        description: "Comma-separated tickers"
        required: true
        default: "ARCC,BXSL,OBDC,FSK,PSEC,BIZD"
      nav_auto_source:
        description: "Auto NAV source"
        required: true
        default: "sec"
      nav_fresh_max_days:
        description: "NAV freshness max days"
        required: true
        default: "120"
      nav_auto_max_filings:
        description: "Max recent filings to scan per ticker"
        required: true
        default: "6"
      sec_max_docs_per_filing:
        description: "Max SEC docs to scan per filing"
        required: true
        default: "5"
      sec_use_cache:
        description: "Use local SEC response cache (true/false)"
        required: true
        default: "true"
      commit_output:
        description: "Commit output back to repo (true/false)"
        required: true
        default: "true"

permissions:
  contents: write

concurrency:
  group: private-credit-nav-overlay
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy requests yfinance

      - name: Prepare paths
        id: prep
        shell: bash
        run: |
          OUT_DIR="${{ github.event.inputs.out_dir }}"
          if [ -z "$OUT_DIR" ]; then
            OUT_DIR="private_credit_nav_cache"
          fi

          MANUAL_NAV="${{ github.event.inputs.manual_nav }}"
          if [ -z "$MANUAL_NAV" ]; then
            MANUAL_NAV="${OUT_DIR}/inputs/manual_nav.json"
          fi

          echo "out_dir=$OUT_DIR" >> "$GITHUB_OUTPUT"
          echo "manual_nav=$MANUAL_NAV" >> "$GITHUB_OUTPUT"

      - name: Ensure output directories exist
        shell: bash
        run: |
          mkdir -p "${{ steps.prep.outputs.out_dir }}/inputs"
          touch "${{ steps.prep.outputs.out_dir }}/inputs/.gitkeep"

      - name: Run NAV overlay builder
        shell: bash
        run: |
          CMD=(
            python tools/build_private_credit_nav_overlay.py
            --out-dir "${{ steps.prep.outputs.out_dir }}"
            --manual-nav "${{ steps.prep.outputs.manual_nav }}"
            --tickers "${{ github.event.inputs.tickers }}"
            --nav-auto-source "${{ github.event.inputs.nav_auto_source }}"
            --nav-fresh-max-days "${{ github.event.inputs.nav_fresh_max_days }}"
            --nav-auto-max-filings "${{ github.event.inputs.nav_auto_max_filings }}"
            --sec-max-docs-per-filing "${{ github.event.inputs.sec_max_docs_per_filing }}"
            --sec-user-agent "private-credit-nav-overlay-github-actions/1.0 your_email@example.com"
          )

          if [ "${{ github.event.inputs.sec_use_cache }}" = "true" ]; then
            CMD+=(--sec-use-cache)
          fi

          printf 'Running command:\n%s\n' "${CMD[*]}"
          "${CMD[@]}"

      - name: Debug output tree
        shell: bash
        run: |
          echo "OUT_DIR=${{ steps.prep.outputs.out_dir }}"
          ls -R "${{ steps.prep.outputs.out_dir }}" || true

      - name: Show latest JSON summary
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          latest = Path("${{ steps.prep.outputs.out_dir }}") / "nav_latest.json"
          print(f"Looking for: {latest}")

          if latest.exists():
              obj = json.loads(latest.read_text(encoding="utf-8"))
              print(json.dumps(obj.get("summary", {}), ensure_ascii=False, indent=2))
          else:
              print(f"Missing file: {latest}")
          PY

      - name: Upload NAV artifact
        uses: actions/upload-artifact@v4
        with:
          name: private-credit-nav-overlay
          path: |
            ${{ steps.prep.outputs.out_dir }}/nav_latest.json
            ${{ steps.prep.outputs.out_dir }}/nav_history.json
            ${{ steps.prep.outputs.out_dir }}/inputs/manual_nav.json
            ${{ steps.prep.outputs.out_dir }}/inputs/.gitkeep
          if-no-files-found: warn

      - name: Commit output
        if: ${{ github.event.inputs.commit_output == 'true' }}
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "${{ steps.prep.outputs.out_dir }}" || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Add/update private credit NAV overlay output"
          git push