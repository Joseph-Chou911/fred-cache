name: tw0050-bb60-forwardmdd20

on:
  workflow_dispatch:
    inputs:
      base_tsmc_override:
        description: "Optional override for TSMC base price (e.g. 1925)"
        required: false
        default: ""
  schedule:
    - cron: "35 6 * * 1-5"

permissions:
  contents: write

concurrency:
  group: tw0050-bb60-forwardmdd20
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance pytz requests

      - name: Debug yfinance fetch (quick)
        run: |
          python - << 'PY'
          import yfinance as yf
          print("yfinance_version:", yf.__version__)
          df = yf.Ticker("0050.TW").history(period="5d", interval="1d")
          print("rows:", 0 if df is None else len(df))
          print(df.tail(3))
          PY

      - name: Run compute
        run: |
          python scripts/tw0050_bb60_k2_forwardmdd20.py \
            --ticker 0050.TW \
            --cache_dir tw0050_bb_cache \
            --bb_window 60 \
            --bb_k 2 \
            --fwd_days 20 \
            --price_col adjclose

      - name: Assert stats has min-audit fields
        run: |
          python - << 'PY'
          import json
          p = "tw0050_bb_cache/stats_latest.json"
          j = json.load(open(p, "r", encoding="utf-8"))
          f = j.get("forward_mdd", {})
          need = ["min_entry_date", "min_entry_price", "min_future_date", "min_future_price"]
          miss = [k for k in need if k not in f]
          print("forward_mdd keys:", sorted(list(f.keys())))
          if miss:
            raise SystemExit(f"ERROR: stats_latest.json missing min-audit fields: {miss}")
          print("OK: min-audit fields present.")
          PY

      # compute 後、build report 前：抓 0050 籌碼 overlay（TWSE T86 + TWT72U）
      - name: Fetch 0050 chip overlay (TWSE T86 + TWT72U)
        shell: bash
        run: |
          set -euo pipefail
          set -x
          python scripts/fetch_tw0050_chip_overlay.py \
            --cache_dir tw0050_bb_cache \
            --stock_no 0050 \
            --stats_path tw0050_bb_cache/stats_latest.json \
            --out tw0050_bb_cache/chip_overlay.json \
            --window_n 5

      - name: Debug chip overlay
        run: |
          ls -al tw0050_bb_cache
          echo "---- chip_overlay head ----"
          python - << 'PY'
          import json
          p = "tw0050_bb_cache/chip_overlay.json"
          j = json.load(open(p, "r", encoding="utf-8"))
          print("meta:", j.get("meta", {}))
          print("dq.flags:", j.get("dq", {}).get("flags", []))
          data = j.get("data", {})
          print("t86_agg:", data.get("t86_agg", {}))
          print("borrow_summary:", data.get("borrow_summary", {}))

          # minimal sanity checks
          if "per_day" not in data:
            raise SystemExit("ERROR: chip_overlay missing data.per_day")
          bs = data.get("borrow_summary", {})
          if bs and (bs.get("asof_date") is None):
            raise SystemExit("ERROR: borrow_summary.asof_date is null")
          PY

      - name: Build report
        run: |
          python scripts/build_tw0050_bb_report.py \
            --cache_dir tw0050_bb_cache \
            --tail_days 15 \
            --out tw0050_bb_cache/report.md

      - name: Resolve base_tsmc
        id: resolve_tsmc
        shell: bash
        env:
          BASE_TSMC_OVERRIDE: ${{ github.event.inputs.base_tsmc_override || '' }}
        run: |
          set -euo pipefail

          if [ -n "${BASE_TSMC_OVERRIDE}" ]; then
            echo "base_tsmc=${BASE_TSMC_OVERRIDE}" >> "$GITHUB_OUTPUT"
            echo "Using manual override base_tsmc=${BASE_TSMC_OVERRIDE}"
          else
            echo "base_tsmc=1890" >> "$GITHUB_OUTPUT"
            echo "Using fallback base_tsmc=1890"
          fi

      - name: Build merged valuation + BB report
        run: |
          python tools/merge_0050_valuation_bb.py \
            --bb-stats tw0050_bb_cache/stats_latest.json \
            --base-tsmc "${{ steps.resolve_tsmc.outputs.base_tsmc }}" \
            --out-json tw0050_bb_cache/merged_latest.json \
            --out-md tw0050_bb_cache/merged_report.md

      - name: Assert merged artifacts
        run: |
          python - << 'PY'
          import json
          import os

          p_json = "tw0050_bb_cache/merged_latest.json"
          p_md = "tw0050_bb_cache/merged_report.md"

          if not os.path.exists(p_json):
            raise SystemExit(f"ERROR: missing {p_json}")
          if not os.path.exists(p_md):
            raise SystemExit(f"ERROR: missing {p_md}")

          j = json.load(open(p_json, "r", encoding="utf-8"))

          need_top = ["meta", "inputs", "valuation_cases", "bb_snapshot", "combined"]
          miss_top = [k for k in need_top if k not in j]
          if miss_top:
            raise SystemExit(f"ERROR: merged_latest.json missing top-level keys: {miss_top}")

          bb = j.get("bb_snapshot", {})
          for k in ["state", "bb_z", "regime_tag", "regime_allowed"]:
            if k not in bb:
              raise SystemExit(f"ERROR: merged_latest.json missing bb_snapshot.{k}")

          vals = j.get("valuation_cases", [])
          if not isinstance(vals, list) or len(vals) == 0:
            raise SystemExit("ERROR: valuation_cases is empty")

          combined = j.get("combined", {})
          for k in ["base_execution_bias", "dq_overlay", "combined_execution_bias"]:
            if k not in combined:
              raise SystemExit(f"ERROR: merged_latest.json missing combined.{k}")

          inputs = j.get("inputs", {})
          schema_validation = inputs.get("schema_validation", {})
          if "validated" not in schema_validation:
            raise SystemExit("ERROR: merged_latest.json missing inputs.schema_validation.validated")
          if schema_validation.get("validated") is not True:
            raise SystemExit(
              f"ERROR: schema validation did not pass cleanly: {schema_validation}"
            )

          print("OK: merged artifacts present and minimally valid.")
          print("bb_snapshot:", {
            "state": bb.get("state"),
            "bb_z": bb.get("bb_z"),
            "regime_tag": bb.get("regime_tag"),
            "regime_allowed": bb.get("regime_allowed"),
          })
          print("valuation_cases count:", len(vals))
          print("combined:", {
            "base_execution_bias": combined.get("base_execution_bias"),
            "dq_overlay": combined.get("dq_overlay"),
            "combined_execution_bias": combined.get("combined_execution_bias"),
          })
          print("schema_validation:", schema_validation)
          PY

      - name: Debug artifacts
        run: |
          ls -al tw0050_bb_cache
          echo "---- report head ----"
          head -n 30 tw0050_bb_cache/report.md || true
          echo "---- merged report head ----"
          head -n 50 tw0050_bb_cache/merged_report.md || true
          echo "---- merged latest summary ----"
          python - << 'PY'
          import json
          p = "tw0050_bb_cache/merged_latest.json"
          j = json.load(open(p, "r", encoding="utf-8"))
          print("meta:", j.get("meta", {}))
          print("inputs.base_sources:", j.get("inputs", {}).get("base_sources", {}))
          print("inputs.dividend_drag:", j.get("inputs", {}).get("dividend_drag", {}))
          print("inputs.schema_validation:", j.get("inputs", {}).get("schema_validation", {}))
          print("bb_snapshot:", {
            "date": j.get("bb_snapshot", {}).get("date"),
            "price_used": j.get("bb_snapshot", {}).get("price_used"),
            "state": j.get("bb_snapshot", {}).get("state"),
            "bb_z": j.get("bb_snapshot", {}).get("bb_z"),
            "regime_tag": j.get("bb_snapshot", {}).get("regime_tag"),
            "regime_allowed": j.get("bb_snapshot", {}).get("regime_allowed"),
          })
          print("combined:", {
            "base_execution_bias": j.get("combined", {}).get("base_execution_bias"),
            "dq_overlay": j.get("combined", {}).get("dq_overlay"),
            "combined_execution_bias": j.get("combined", {}).get("combined_execution_bias"),
          })
          print("valuation_cases_count:", len(j.get("valuation_cases", [])))
          PY

      - name: Commit artifacts (if changed)
        run: |
          set -e
          git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A tw0050_bb_cache
            git commit -m "Update 0050 BB(60,2) + forward_mdd(20D) + merged valuation report v1.3"
            git push
          else
            echo "No changes to commit."
          fi