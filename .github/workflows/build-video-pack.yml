name: build-video-pack (roll25 + margin + tw0050_bb) - manual

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-video-pack
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      OUT_DIR: video_pack
      TZ: Asia/Taipei
      # Use a workspace-local matplotlib config dir to avoid runner-context + cache surprises
      MPLCONFIGDIR: .mplconfig

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # =========================
      # Install system fonts for CJK + clear matplotlib cache (avoid tofu + "stale" look)
      # =========================
      - name: Install CJK fonts (Noto CJK) + clear matplotlib cache
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fontconfig
          fc-cache -fv

          # Clear matplotlib caches (both default and our forced MPLCONFIGDIR)
          rm -rf ~/.cache/matplotlib || true

          if [[ -z "${MPLCONFIGDIR}" || "${MPLCONFIGDIR}" == "/" || "${MPLCONFIGDIR}" == "." ]]; then
            echo "Refusing to delete unsafe MPLCONFIGDIR='${MPLCONFIGDIR}'"
            exit 1
          fi
          rm -rf "${MPLCONFIGDIR}" || true
          mkdir -p "${MPLCONFIGDIR}"

          echo "=== fc-list (noto cjk, sample) ==="
          fc-list | grep -i "noto.*cjk" | head -n 20 || true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pandas numpy matplotlib

      # =========================
      # Clean old outputs (avoid stale files)
      # =========================
      - name: Clean old outputs
        run: |
          set -euo pipefail
          echo "OUT_DIR='${OUT_DIR}'"
          if [[ -z "${OUT_DIR}" || "${OUT_DIR}" == "/" || "${OUT_DIR}" == "." ]]; then
            echo "Refusing to delete unsafe OUT_DIR='${OUT_DIR}'"
            exit 1
          fi

          if [[ -d "${OUT_DIR}" ]]; then
            echo "Removing existing '${OUT_DIR}' to avoid stale artifacts..."
            rm -rf "${OUT_DIR}"
          fi

          mkdir -p "${OUT_DIR}"
          echo "Clean done."

      - name: Sanity check inputs exist
        run: |
          set -euo pipefail
          ls -al tw0050_bb_cache/stats_latest.json
          ls -al roll25_cache/stats_latest.json
          ls -al taiwan_margin_cache/latest.json
          ls -al roll25_cache/roll25.json

      - name: Build video pack
        run: |
          set -euo pipefail
          python tools/build_video_pack.py \
            --tw0050 tw0050_bb_cache/stats_latest.json \
            --roll25 roll25_cache/stats_latest.json \
            --margin taiwan_margin_cache/latest.json \
            --out_dir "${OUT_DIR}"

      - name: Make snapshot charts (episode_pack)
        run: |
          set -euo pipefail
          mkdir -p "${OUT_DIR}/charts_snapshot"

          # Backward-compatible: only add --lang zh if your script supports it
          EXTRA_LANG_ARGS=""
          if python tools/make_episode_charts.py -h 2>&1 | grep -q -- "--lang"; then
            EXTRA_LANG_ARGS="--lang zh"
            echo "Detected --lang support; will use: ${EXTRA_LANG_ARGS}"
          else
            echo "No --lang option in make_episode_charts.py; skip language flag."
          fi

          python tools/make_episode_charts.py \
            --episode_pack "${OUT_DIR}/episode_pack.json" \
            --out_dir "${OUT_DIR}/charts_snapshot" \
            ${EXTRA_LANG_ARGS}

      - name: Make long-series charts (roll25.json)
        run: |
          set -euo pipefail
          mkdir -p "${OUT_DIR}/charts_roll25"
          python tools/make_roll25_json_charts.py \
            --roll25_json roll25_cache/roll25.json \
            --out_dir "${OUT_DIR}/charts_roll25" \
            --max_points 400

      - name: Show outputs (audit)
        run: |
          set -euo pipefail
          echo "=== out_dir listing ==="
          ls -al "${OUT_DIR}"
          echo "=== episode_* files ==="
          find "${OUT_DIR}" -maxdepth 1 -type f -name "episode_*" -print
          echo "=== charts (snapshot) ==="
          ls -al "${OUT_DIR}/charts_snapshot" || true
          echo "=== charts (roll25) ==="
          ls -al "${OUT_DIR}/charts_roll25" || true
          echo "=== file sizes ==="
          wc -c "${OUT_DIR}/episode_pack.json" "${OUT_DIR}/episode_outline.md" "${OUT_DIR}/episode_data.md" || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-pack
          path: |
            ${{ env.OUT_DIR }}/episode_pack.json
            ${{ env.OUT_DIR }}/episode_outline.md
            ${{ env.OUT_DIR }}/episode_data.md
            ${{ env.OUT_DIR }}/charts_snapshot/*.png
            ${{ env.OUT_DIR }}/charts_roll25/*.png
            ${{ env.OUT_DIR }}/charts_roll25/roll25_chart_ready.csv
          if-no-files-found: error

      - name: Commit output
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          echo "=== git status (before add) ==="
          git status --porcelain

          # Stage additions + modifications + deletions under OUT_DIR
          git add -A "${OUT_DIR}"

          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "build: video pack outputs (+charts)"
          git push