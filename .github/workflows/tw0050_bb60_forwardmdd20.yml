name: tw0050-bb60-forwardmdd20

on:
  workflow_dispatch:
    inputs:
      base_tsmc_override:
        description: "Optional override for TSMC base price (e.g. 1925)"
        required: false
        default: ""
      tx_night_last:
        description: "Optional TX night-session close (manual input, e.g. 32442)"
        required: false
        default: ""
      eps_base_override:
        description: "Optional active EPS base override for live valuation (e.g. 66.25)"
        required: false
        default: ""
      tsmc_weight_override:
        description: "Optional TSMC weight override in 0050 (e.g. 0.6408)"
        required: false
        default: ""
      tsmc_weight_as_of:
        description: "Optional as-of date for TSMC weight metadata (e.g. 2026-03-13)"
        required: false
        default: ""
      suggested_eps_base:
        description: "Optional display-only suggested EPS base (never auto-applied)"
        required: false
        default: ""
      suggested_eps_source:
        description: "Optional display-only suggested EPS source"
        required: false
        default: ""
      suggested_eps_as_of:
        description: "Optional display-only suggested EPS as-of date"
        required: false
        default: ""
      suggested_eps_method:
        description: "Optional display-only suggested EPS method"
        required: false
        default: ""
  schedule:
    - cron: "35 6 * * 1-5"

permissions:
  contents: write

concurrency:
  group: tw0050-bb60-forwardmdd20
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy yfinance pytz requests

      - name: Debug yfinance fetch (quick)
        run: |
          python - << 'PY'
          import yfinance as yf
          print("yfinance_version:", yf.__version__)
          df = yf.Ticker("0050.TW").history(period="5d", interval="1d")
          print("rows:", 0 if df is None else len(df))
          print(df.tail(3))
          PY

      - name: Run compute
        run: |
          python scripts/tw0050_bb60_k2_forwardmdd20.py \
            --ticker 0050.TW \
            --cache_dir tw0050_bb_cache \
            --bb_window 60 \
            --bb_k 2 \
            --fwd_days 20 \
            --price_col adjclose

      - name: Assert stats has min-audit fields
        run: |
          python - << 'PY'
          import json
          p = "tw0050_bb_cache/stats_latest.json"
          j = json.load(open(p, "r", encoding="utf-8"))
          f = j.get("forward_mdd", {})
          need = ["min_entry_date", "min_entry_price", "min_future_date", "min_future_price"]
          miss = [k for k in need if k not in f]
          print("forward_mdd keys:", sorted(list(f.keys())))
          if miss:
            raise SystemExit(f"ERROR: stats_latest.json missing min-audit fields: {miss}")
          print("OK: min-audit fields present.")
          PY

      - name: Fetch 0050 chip overlay (TWSE T86 + TWT72U)
        shell: bash
        run: |
          set -euo pipefail
          set -x
          python scripts/fetch_tw0050_chip_overlay.py \
            --cache_dir tw0050_bb_cache \
            --stock_no 0050 \
            --stats_path tw0050_bb_cache/stats_latest.json \
            --out tw0050_bb_cache/chip_overlay.json \
            --window_n 5

      - name: Debug chip overlay
        run: |
          ls -al tw0050_bb_cache
          echo "---- chip_overlay head ----"
          python - << 'PY'
          import json
          p = "tw0050_bb_cache/chip_overlay.json"
          j = json.load(open(p, "r", encoding="utf-8"))
          print("meta:", j.get("meta", {}))
          print("dq.flags:", j.get("dq", {}).get("flags", []))
          data = j.get("data", {})
          print("t86_agg:", data.get("t86_agg", {}))
          print("borrow_summary:", data.get("borrow_summary", {}))

          if "per_day" not in data:
            raise SystemExit("ERROR: chip_overlay missing data.per_day")
          bs = data.get("borrow_summary", {})
          if bs and (bs.get("asof_date") is None):
            raise SystemExit("ERROR: borrow_summary.asof_date is null")
          PY

      - name: Build report
        run: |
          python scripts/build_tw0050_bb_report.py \
            --cache_dir tw0050_bb_cache \
            --tail_days 15 \
            --out tw0050_bb_cache/report.md

      - name: Update TSMC quarterly EPS tracker
        shell: bash
        run: |
          set -euo pipefail
          python tools/update_tsmc_quarterly_eps_tracker.py \
            --out tw0050_bb_cache/quarterly_eps_tracker.json

      - name: Assert quarterly EPS tracker
        run: |
          python - << 'PY'
          import json
          import os

          p = "tw0050_bb_cache/quarterly_eps_tracker.json"
          if not os.path.exists(p):
            raise SystemExit(f"ERROR: missing {p}")

          j = json.load(open(p, "r", encoding="utf-8"))
          if not isinstance(j, dict):
            raise SystemExit("ERROR: quarterly_eps_tracker.json is not an object")

          meta = j.get("meta", {})
          quarters = j.get("quarters", None)

          if not isinstance(meta, dict):
            raise SystemExit("ERROR: quarterly_eps_tracker.json meta is not an object")
          if not isinstance(quarters, list):
            raise SystemExit("ERROR: quarterly_eps_tracker.json quarters is not a list")
          if len(quarters) == 0:
            raise SystemExit("ERROR: quarterly_eps_tracker.json quarters is empty")

          for i, row in enumerate(quarters):
            if not isinstance(row, dict):
              raise SystemExit(f"ERROR: quarterly_eps_tracker row #{i} is not an object")
            for k in ["quarter", "eps", "source", "as_of_date"]:
              if k not in row:
                raise SystemExit(f"ERROR: quarterly_eps_tracker row #{i} missing {k}")

          print("OK: quarterly EPS tracker present and minimally valid.")
          print("meta:", meta)
          print("quarters_count:", len(quarters))
          print("latest_quarter:", quarters[-1].get("quarter"))
          print("latest_eps:", quarters[-1].get("eps"))
          PY

      - name: Debug quarterly EPS tracker
        run: |
          echo "---- quarterly_eps_tracker head ----"
          python - << 'PY'
          import json
          p = "tw0050_bb_cache/quarterly_eps_tracker.json"
          j = json.load(open(p, "r", encoding="utf-8"))
          print("meta:", j.get("meta", {}))
          qs = j.get("quarters", [])
          print("quarters_count:", len(qs))
          for row in qs[-6:]:
            print(row)
          PY

      - name: Resolve base_tsmc
        id: resolve_tsmc
        shell: bash
        env:
          BASE_TSMC_OVERRIDE: ${{ github.event.inputs.base_tsmc_override || '' }}
        run: |
          set -euo pipefail

          if [ -n "${BASE_TSMC_OVERRIDE}" ]; then
            echo "base_tsmc=${BASE_TSMC_OVERRIDE}" >> "$GITHUB_OUTPUT"
            echo "Using manual override base_tsmc=${BASE_TSMC_OVERRIDE}"
          else
            echo "base_tsmc=1890" >> "$GITHUB_OUTPUT"
            echo "Using fallback base_tsmc=1890"
          fi

      - name: Build merged valuation + BB report
        shell: bash
        env:
          TX_NIGHT_LAST_INPUT: ${{ github.event.inputs.tx_night_last || '' }}
          EPS_BASE_OVERRIDE_INPUT: ${{ github.event.inputs.eps_base_override || '' }}
          TSMC_WEIGHT_OVERRIDE_INPUT: ${{ github.event.inputs.tsmc_weight_override || '' }}
          TSMC_WEIGHT_AS_OF_INPUT: ${{ github.event.inputs.tsmc_weight_as_of || '' }}
          SUGGESTED_EPS_BASE_INPUT: ${{ github.event.inputs.suggested_eps_base || '' }}
          SUGGESTED_EPS_SOURCE_INPUT: ${{ github.event.inputs.suggested_eps_source || '' }}
          SUGGESTED_EPS_AS_OF_INPUT: ${{ github.event.inputs.suggested_eps_as_of || '' }}
          SUGGESTED_EPS_METHOD_INPUT: ${{ github.event.inputs.suggested_eps_method || '' }}
        run: |
          set -euo pipefail

          ARGS=(
            --bb-stats tw0050_bb_cache/stats_latest.json
            --base-tsmc "${{ steps.resolve_tsmc.outputs.base_tsmc }}"
            --quarterly-eps-json tw0050_bb_cache/quarterly_eps_tracker.json
            --roll25-report roll25_cache/report.md
            --out-json tw0050_bb_cache/merged_latest.json
            --out-md tw0050_bb_cache/merged_report.md
          )

          if [ -n "${TX_NIGHT_LAST_INPUT}" ]; then
            ARGS+=(--tx-night-last "${TX_NIGHT_LAST_INPUT}")
            echo "Using manual tx_night_last=${TX_NIGHT_LAST_INPUT}"
          else
            echo "No tx_night_last provided; pre-execution shock review will run without manual TX close."
          fi

          if [ -n "${EPS_BASE_OVERRIDE_INPUT}" ]; then
            ARGS+=(--eps-base-override "${EPS_BASE_OVERRIDE_INPUT}")
            echo "Using manual eps_base_override=${EPS_BASE_OVERRIDE_INPUT}"
          else
            echo "No eps_base_override provided; active_eps_base will use config."
          fi

          if [ -n "${TSMC_WEIGHT_OVERRIDE_INPUT}" ]; then
            ARGS+=(--tsmc-weight "${TSMC_WEIGHT_OVERRIDE_INPUT}")
            echo "Using manual tsmc_weight_override=${TSMC_WEIGHT_OVERRIDE_INPUT}"
          else
            echo "No tsmc_weight_override provided; tsmc_weight will use config."
          fi

          if [ -n "${TSMC_WEIGHT_AS_OF_INPUT}" ]; then
            ARGS+=(--tsmc-weight-as-of "${TSMC_WEIGHT_AS_OF_INPUT}")
            echo "Using tsmc_weight_as_of=${TSMC_WEIGHT_AS_OF_INPUT}"
          else
            echo "No tsmc_weight_as_of provided; tsmc_weight metadata date will remain default."
          fi

          if [ -n "${SUGGESTED_EPS_BASE_INPUT}" ]; then
            ARGS+=(--suggested-eps-base "${SUGGESTED_EPS_BASE_INPUT}")
            echo "Using display-only suggested_eps_base=${SUGGESTED_EPS_BASE_INPUT}"
          else
            echo "No suggested_eps_base provided; display-only suggestion will remain empty."
          fi

          if [ -n "${SUGGESTED_EPS_SOURCE_INPUT}" ]; then
            ARGS+=(--suggested-eps-source "${SUGGESTED_EPS_SOURCE_INPUT}")
            echo "Using suggested_eps_source=${SUGGESTED_EPS_SOURCE_INPUT}"
          fi

          if [ -n "${SUGGESTED_EPS_AS_OF_INPUT}" ]; then
            ARGS+=(--suggested-eps-as-of "${SUGGESTED_EPS_AS_OF_INPUT}")
            echo "Using suggested_eps_as_of=${SUGGESTED_EPS_AS_OF_INPUT}"
          fi

          if [ -n "${SUGGESTED_EPS_METHOD_INPUT}" ]; then
            ARGS+=(--suggested-eps-method "${SUGGESTED_EPS_METHOD_INPUT}")
            echo "Using suggested_eps_method=${SUGGESTED_EPS_METHOD_INPUT}"
          fi

          python tools/merge_0050_valuation_bb.py "${ARGS[@]}"

      - name: Assert merged artifacts
        run: |
          python - << 'PY'
          import json
          import os

          p_json = "tw0050_bb_cache/merged_latest.json"
          p_md = "tw0050_bb_cache/merged_report.md"

          if not os.path.exists(p_json):
            raise SystemExit(f"ERROR: missing {p_json}")
          if not os.path.exists(p_md):
            raise SystemExit(f"ERROR: missing {p_md}")

          j = json.load(open(p_json, "r", encoding="utf-8"))

          need_top = [
            "meta",
            "inputs",
            "slow_variable_review",
            "valuation_cases",
            "family_interpolation",
            "bb_snapshot",
            "combined",
          ]
          miss_top = [k for k in need_top if k not in j]
          if miss_top:
            raise SystemExit(f"ERROR: merged_latest.json missing top-level keys: {miss_top}")

          bb = j.get("bb_snapshot", {})
          for k in ["state", "bb_z", "regime_tag", "regime_allowed"]:
            if k not in bb:
              raise SystemExit(f"ERROR: merged_latest.json missing bb_snapshot.{k}")

          vals = j.get("valuation_cases", [])
          if not isinstance(vals, list) or len(vals) == 0:
            raise SystemExit("ERROR: valuation_cases is empty")

          slow = j.get("slow_variable_review", {})
          for k in [
            "active_eps_base",
            "active_eps_base_source",
            "eps_base_policy",
            "suggested_eps_meta",
            "family_targets",
            "tsmc_weight_meta",
            "eps_quarters_collected",
            "annual_eps_candidate",
            "annual_eps_candidate_complete",
            "ready_to_replace_active_eps_base",
          ]:
            if k not in slow:
              raise SystemExit(f"ERROR: merged_latest.json missing slow_variable_review.{k}")

          fam_top = j.get("family_interpolation", {})
          if "enabled" not in fam_top:
            raise SystemExit("ERROR: merged_latest.json missing family_interpolation.enabled")
          if fam_top.get("enabled") is True and "families" not in fam_top:
            raise SystemExit("ERROR: family_interpolation.enabled=True but families missing")

          combined = j.get("combined", {})
          for k in [
            "base_execution_bias",
            "dq_overlay",
            "combined_execution_bias",
            "fast_shock_override",
            "final_execution_bias",
            "pre_execution_review",
            "family_interpolation",
          ]:
            if k not in combined:
              raise SystemExit(f"ERROR: merged_latest.json missing combined.{k}")

          pre = combined.get("pre_execution_review", {})
          for k in ["available", "preopen_shock_flag", "shock_override"]:
            if k not in pre:
              raise SystemExit(f"ERROR: merged_latest.json missing combined.pre_execution_review.{k}")

          fam_combined = combined.get("family_interpolation", {})
          if "enabled" not in fam_combined:
            raise SystemExit("ERROR: merged_latest.json missing combined.family_interpolation.enabled")

          inputs = j.get("inputs", {})
          schema_validation = inputs.get("schema_validation", {})
          if "validated" not in schema_validation:
            raise SystemExit("ERROR: merged_latest.json missing inputs.schema_validation.validated")
          if schema_validation.get("validated") is not True:
            raise SystemExit(
              f"ERROR: schema validation did not pass cleanly: {schema_validation}"
            )

          print("OK: merged artifacts present and minimally valid.")
          print("bb_snapshot:", {
            "state": bb.get("state"),
            "bb_z": bb.get("bb_z"),
            "regime_tag": bb.get("regime_tag"),
            "regime_allowed": bb.get("regime_allowed"),
          })
          print("slow_variable_review:", {
            "active_eps_base": slow.get("active_eps_base"),
            "active_eps_base_source": slow.get("active_eps_base_source"),
            "suggested_eps_base": slow.get("suggested_eps_base"),
            "family_targets": slow.get("family_targets"),
            "tsmc_weight_meta": slow.get("tsmc_weight_meta"),
            "eps_quarters_collected": slow.get("eps_quarters_collected"),
            "annual_eps_candidate": slow.get("annual_eps_candidate"),
            "annual_eps_candidate_complete": slow.get("annual_eps_candidate_complete"),
            "ready_to_replace_active_eps_base": slow.get("ready_to_replace_active_eps_base"),
          })
          print("valuation_cases count:", len(vals))
          print("family_interpolation(top):", {
            "enabled": fam_top.get("enabled"),
            "family_count": len(fam_top.get("families", [])) if isinstance(fam_top.get("families"), list) else "N/A",
            "targets": fam_top.get("targets"),
          })
          print("combined:", {
            "base_execution_bias": combined.get("base_execution_bias"),
            "dq_overlay": combined.get("dq_overlay"),
            "combined_execution_bias": combined.get("combined_execution_bias"),
            "fast_shock_override": combined.get("fast_shock_override"),
            "final_execution_bias": combined.get("final_execution_bias"),
          })
          print("pre_execution_review:", {
            "available": pre.get("available"),
            "preopen_shock_flag": pre.get("preopen_shock_flag"),
            "shock_override": pre.get("shock_override"),
          })
          print("schema_validation:", schema_validation)
          PY

      - name: Debug artifacts
        run: |
          ls -al tw0050_bb_cache
          echo "---- report head ----"
          head -n 40 tw0050_bb_cache/report.md || true
          echo "---- quarterly EPS tracker head ----"
          python - << 'PY'
          import json
          p = "tw0050_bb_cache/quarterly_eps_tracker.json"
          j = json.load(open(p, "r", encoding="utf-8"))
          print("meta:", j.get("meta", {}))
          qs = j.get("quarters", [])
          print("quarters_count:", len(qs))
          for row in qs[-6:]:
            print(row)
          PY
          echo "---- merged report head ----"
          head -n 220 tw0050_bb_cache/merged_report.md || true
          echo "---- merged latest summary ----"
          python - << 'PY'
          import json
          p = "tw0050_bb_cache/merged_latest.json"
          j = json.load(open(p, "r", encoding="utf-8"))

          print("meta:", j.get("meta", {}))
          print("inputs.base_sources:", j.get("inputs", {}).get("base_sources", {}))
          print("inputs.dividend_drag:", j.get("inputs", {}).get("dividend_drag", {}))
          print("inputs.family_interpolation_enabled:", j.get("inputs", {}).get("family_interpolation_enabled"))
          print("inputs.schema_validation:", j.get("inputs", {}).get("schema_validation", {}))
          print("inputs.roll25_report_path:", j.get("inputs", {}).get("roll25_report_path"))
          print("inputs.tx_night_last:", j.get("inputs", {}).get("tx_night_last"))

          slow = j.get("slow_variable_review", {})
          print("slow_variable_review:", slow)

          print("bb_snapshot:", {
            "date": j.get("bb_snapshot", {}).get("date"),
            "price_used": j.get("bb_snapshot", {}).get("price_used"),
            "state": j.get("bb_snapshot", {}).get("state"),
            "bb_z": j.get("bb_snapshot", {}).get("bb_z"),
            "regime_tag": j.get("bb_snapshot", {}).get("regime_tag"),
            "regime_allowed": j.get("bb_snapshot", {}).get("regime_allowed"),
          })

          fam_top = j.get("family_interpolation", {})
          print("family_interpolation(top):", {
            "enabled": fam_top.get("enabled"),
            "targets": fam_top.get("targets"),
            "family_count": len(fam_top.get("families", [])) if isinstance(fam_top.get("families"), list) else "N/A",
            "note": fam_top.get("note"),
          })
          if fam_top.get("families"):
            first = fam_top["families"][0]
            print("family_interpolation(first family):", {
              "family_name": first.get("family_name"),
              "years_ahead": first.get("years_ahead"),
              "current_price_percentile": first.get("current_price_percentile"),
              "current_zone": first.get("current_zone"),
              "family_stats": first.get("family_stats"),
            })

          combined = j.get("combined", {})
          print("combined:", {
            "base_execution_bias": combined.get("base_execution_bias"),
            "dq_overlay": combined.get("dq_overlay"),
            "combined_execution_bias": combined.get("combined_execution_bias"),
            "fast_shock_override": combined.get("fast_shock_override"),
            "final_execution_bias": combined.get("final_execution_bias"),
            "action_instruction": combined.get("action_instruction"),
          })
          print("pre_execution_review:", combined.get("pre_execution_review", {}))

          fam_combined = combined.get("family_interpolation", {})
          print("family_interpolation(combined):", {
            "enabled": fam_combined.get("enabled"),
            "targets": fam_combined.get("targets"),
            "family_count": len(fam_combined.get("families", [])) if isinstance(fam_combined.get("families"), list) else "N/A",
          })

          print("valuation_cases_count:", len(j.get("valuation_cases", [])))
          PY

      - name: Commit artifacts (if changed)
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "$(git status --porcelain tw0050_bb_cache)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            git add -A tw0050_bb_cache
            git commit -m "Update 0050 BB(60,2) + forward_mdd(20D) + quarterly EPS tracker + merged valuation report v1.6a"

            for i in 1 2 3; do
              echo "Attempt $i: fetch/rebase/push"
              git fetch origin main

              if git rebase origin/main; then
                if git push origin HEAD:main; then
                  echo "Push succeeded."
                  exit 0
                fi
              fi

              git rebase --abort || true
              sleep 3
            done

            echo "Push failed after 3 attempts."
            exit 1
          else
            echo "No changes to commit in tw0050_bb_cache."
          fi