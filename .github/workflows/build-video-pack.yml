name: build-video-pack (roll25 + margin + tw0050_bb) - manual

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-video-pack
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      OUT_DIR: video_pack
      TZ: Asia/Taipei

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install pandas numpy matplotlib

      - name: Sanity check scripts + inputs exist
        run: |
          set -euo pipefail
          echo "=== scripts ==="
          ls -al tools/build_video_pack.py
          ls -al tools/make_episode_charts.py
          ls -al tools/make_roll25_json_charts.py

          echo "=== inputs ==="
          ls -al tw0050_bb_cache/stats_latest.json
          ls -al roll25_cache/stats_latest.json
          ls -al roll25_cache/roll25.json
          ls -al taiwan_margin_cache/latest.json

      - name: Build video pack
        run: |
          set -euo pipefail
          mkdir -p "${OUT_DIR}"
          python tools/build_video_pack.py \
            --tw0050 tw0050_bb_cache/stats_latest.json \
            --roll25 roll25_cache/stats_latest.json \
            --margin taiwan_margin_cache/latest.json \
            --out_dir "${OUT_DIR}"

      - name: Make episode snapshot charts
        run: |
          set -euo pipefail
          mkdir -p "${OUT_DIR}/charts_episode"
          python tools/make_episode_charts.py \
            --episode_pack "${OUT_DIR}/episode_pack.json" \
            --out_dir "${OUT_DIR}/charts_episode" \
            --dpi 160

      - name: Make roll25 long-series charts (from roll25.json)
        run: |
          set -euo pipefail
          mkdir -p "${OUT_DIR}/charts_roll25"
          python tools/make_roll25_json_charts.py \
            --in_json roll25_cache/roll25.json \
            --out_dir "${OUT_DIR}/charts_roll25" \
            --dpi 160

      - name: Show outputs (audit)
        run: |
          set -euo pipefail
          echo "=== out_dir listing ==="
          ls -al "${OUT_DIR}"

          echo "=== episode_* files ==="
          find "${OUT_DIR}" -maxdepth 1 -type f -name "episode_*" -print

          echo "=== charts_episode ==="
          ls -al "${OUT_DIR}/charts_episode" || true
          echo "=== charts_roll25 ==="
          ls -al "${OUT_DIR}/charts_roll25" || true

          echo "=== file sizes ==="
          wc -c \
            "${OUT_DIR}/episode_pack.json" \
            "${OUT_DIR}/episode_outline.md" \
            "${OUT_DIR}/episode_data.md" \
            "${OUT_DIR}/charts_episode/chart_manifest.json" \
            "${OUT_DIR}/charts_roll25/chart_manifest.json"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-pack
          path: |
            video_pack/episode_pack.json
            video_pack/episode_outline.md
            video_pack/episode_data.md
            video_pack/charts_episode/**
            video_pack/charts_roll25/**
          if-no-files-found: error

      - name: Commit output
        run: |
          set -euo pipefail
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git status --porcelain

          git add \
            video_pack/episode_pack.json \
            video_pack/episode_outline.md \
            video_pack/episode_data.md \
            video_pack/charts_episode \
            video_pack/charts_roll25

          git diff --cached --quiet && echo "No changes to commit." && exit 0
          git commit -m "build: video pack + charts"
          git push